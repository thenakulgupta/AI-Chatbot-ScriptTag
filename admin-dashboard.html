<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot Admin Dashboard</title>
    <link rel="stylesheet" href="styles/admin-dashboard.css">
    <link rel="stylesheet" href="styles/markdown-styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="dashboard-container">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <h1 class="dashboard-title">AI Chatbot Admin Dashboard - Demo</h1>
            <p class="dashboard-subtitle">Monitor and manage demo chat sessions only</p>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="total-sessions">-</div>
                    <div class="stat-label">Total Sessions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="active-sessions">-</div>
                    <div class="stat-label">Active Sessions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="total-messages">-</div>
                    <div class="stat-label">Total Messages</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="categories-count">-</div>
                    <div class="stat-label">Categories</div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="content-header">
                <h2 class="content-title">Chat Sessions</h2>
                <div class="filters">
                    <div class="filter-group">
                        <label class="filter-label">Category</label>
                        <select id="category-filter">
                            <option value="demo">Demo</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Status</label>
                        <select id="status-filter">
                            <option value="">All Status</option>
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Search</label>
                        <input type="text" id="search-input" placeholder="Search sessions...">
                    </div>
                </div>
            </div>

            <!-- Sessions Table -->
            <div id="sessions-container">
                <div class="loading">Loading sessions...</div>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination" style="display: none;">
                <button class="pagination-btn" id="prev-btn">Previous</button>
                <span class="pagination-info" id="pagination-info"></span>
                <button class="pagination-btn" id="next-btn">Next</button>
            </div>
        </div>
    </div>

    <!-- Chat Messages Modal -->
    <div id="chat-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Chat Messages</h3>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div id="chat-messages-container">
                    <div class="loading">Loading messages...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let currentPage = 1;
        let currentMessagesPage = 1;
        let currentSessionId = null;
        let isLoadingMessages = false;
        let hasMoreMessages = true;
        const pageSize = 10;
        const messagesPageSize = 20;

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function () {
            loadStats();
            loadSessions();
            setupEventListeners();
        });

        // Event listeners
        function setupEventListeners() {
            // Filter changes
            document.getElementById('category-filter').addEventListener('change', () => {
                currentPage = 1;
                loadSessions();
            });

            document.getElementById('status-filter').addEventListener('change', () => {
                currentPage = 1;
                loadSessions();
            });

            document.getElementById('search-input').addEventListener('input', debounce(() => {
                currentPage = 1;
                loadSessions();
            }, 500));

            // Pagination
            document.getElementById('prev-btn').addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    loadSessions();
                }
            });

            document.getElementById('next-btn').addEventListener('click', () => {
                currentPage++;
                loadSessions();
            });

            // Messages pagination - removed manual pagination buttons
            // Now using scroll-based loading

            // Modal
            document.getElementById('close-modal').addEventListener('click', closeModal);
            document.getElementById('chat-modal').addEventListener('click', (e) => {
                if (e.target.id === 'chat-modal') {
                    closeModal();
                }
            });
        }

        // Load dashboard statistics (demo category only)
        async function loadStats() {
            try {
                const response = await fetch('/api/admin/demo/stats');
                const stats = await response.json();

                document.getElementById('total-sessions').textContent = stats.totalSessions || 0;
                document.getElementById('active-sessions').textContent = stats.activeSessions || 0;
                document.getElementById('total-messages').textContent = stats.totalMessages || 0;
                document.getElementById('categories-count').textContent = stats.categoriesCount || 0;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Load chat sessions
        async function loadSessions() {
            const container = document.getElementById('sessions-container');
            container.innerHTML = '<div class="loading">Loading sessions...</div>';

            try {
                const category = document.getElementById('category-filter').value;
                const status = document.getElementById('status-filter').value;
                const search = document.getElementById('search-input').value;

                const params = new URLSearchParams({
                    page: currentPage,
                    limit: pageSize,
                    ...(status && { status }),
                    ...(search && { search })
                });

                const response = await fetch(`/api/admin/demo/sessions?${params}`);
                const data = await response.json();

                if (data.sessions && data.sessions.length > 0) {
                    renderSessionsTable(data.sessions);
                    updatePagination(data.pagination);
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">💬</div>
                            <h3>No sessions found</h3>
                            <p>No chat sessions match your current filters.</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading sessions:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <h3>Error loading sessions</h3>
                        <p>Please try again later.</p>
                    </div>
                `;
            }
        }

        // Render sessions table
        function renderSessionsTable(sessions) {
            const container = document.getElementById('sessions-container');
            const table = `
                <table class="sessions-table">
                    <thead>
                        <tr>
                            <th>Session ID</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Messages</th>
                            <th>Created</th>
                            <th>Last Activity</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${sessions.map(session => `
                            <tr>
                                <td>
                                    <div class="session-id">${session._id}</div>
                                </td>
                                <td>
                                    <span class="category-badge category-${session.category}">
                                        ${session.category}
                                    </span>
                                </td>
                                <td>
                                    <span class="status-badge status-${session.isActive ? 'active' : 'inactive'}">
                                        ${session.isActive ? 'Active' : 'Inactive'}
                                    </span>
                                </td>
                                <td>${session.messageCount || 0}</td>
                                <td>${formatDate(session.createdAt)}</td>
                                <td>${formatDate(session.lastActivity)}</td>
                                <td>
                                    <button class="action-btn" onclick="viewMessages('${session._id}')">
                                        View Messages
                                    </button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            container.innerHTML = table;
        }

        // Update pagination
        function updatePagination(pagination) {
            const paginationDiv = document.getElementById('pagination');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const info = document.getElementById('pagination-info');

            if (pagination.totalPages > 1) {
                paginationDiv.style.display = 'flex';
                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = currentPage === pagination.totalPages;
                info.textContent = `Page ${currentPage} of ${pagination.totalPages} (${pagination.total} total)`;
            } else {
                paginationDiv.style.display = 'none';
            }
        }

        // View messages for a session
        function viewMessages(sessionId) {
            currentSessionId = sessionId;
            currentMessagesPage = 1;
            hasMoreMessages = true;
            document.getElementById('modal-title').textContent = `Chat Messages - ${sessionId}`;
            document.getElementById('chat-modal').style.display = 'block';

            // Ensure modal is fully visible before loading messages
            setTimeout(() => {
                loadMessages();
            }, 100);
        }

        // Load messages for a session
        async function loadMessages(append = false) {
            if (isLoadingMessages || !hasMoreMessages) return;

            isLoadingMessages = true;
            const container = document.getElementById('chat-messages-container');

            // Store current scroll position and height for maintaining position
            let currentScrollTop = 0;
            let currentScrollHeight = 0;
            let chatMessages = null;

            if (append) {
                chatMessages = container.querySelector('.chat-messages');
                if (chatMessages) {
                    currentScrollTop = chatMessages.scrollTop;
                    currentScrollHeight = chatMessages.scrollHeight;
                }

                // Add loading indicator at the top
                const loadingDiv = document.createElement('div');
                loadingDiv.className = 'loading';
                loadingDiv.textContent = 'Loading older messages...';
                container.insertBefore(loadingDiv, container.firstChild);
            } else {
                container.innerHTML = '<div class="loading">Loading messages...</div>';
            }

            try {
                const params = new URLSearchParams({
                    page: currentMessagesPage,
                    limit: messagesPageSize
                });

                const response = await fetch(`/api/admin/demo/sessions/${currentSessionId}/messages?${params}`);
                const data = await response.json();

                if (data.messages && data.messages.length > 0) {
                    if (append) {
                        // Remove loading indicator
                        const loadingDiv = container.querySelector('.loading');
                        if (loadingDiv) loadingDiv.remove();

                        // Append older messages at the top
                        renderMessages(data.messages, true);

                        // Maintain scroll position after loading older messages
                        if (chatMessages) {
                            const newScrollHeight = chatMessages.scrollHeight;
                            const heightDifference = newScrollHeight - currentScrollHeight;
                            chatMessages.scrollTop = currentScrollTop + heightDifference;
                        }
                    } else {
                        // Initial load - replace content
                        renderMessages(data.messages, false);
                    }

                    hasMoreMessages = data.pagination.hasNext;
                    currentMessagesPage++;
                } else {
                    if (!append) {
                        container.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">💬</div>
                                <h3>No messages found</h3>
                                <p>This session has no messages yet.</p>
                            </div>
                        `;
                    } else {
                        // Remove loading indicator
                        const loadingDiv = container.querySelector('.loading');
                        if (loadingDiv) loadingDiv.remove();
                        hasMoreMessages = false;
                    }
                }
            } catch (error) {
                console.error('Error loading messages:', error);
                if (!append) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">❌</div>
                            <h3>Error loading messages</h3>
                            <p>Please try again later.</p>
                        </div>
                    `;
                } else {
                    // Remove loading indicator
                    const loadingDiv = container.querySelector('.loading');
                    if (loadingDiv) loadingDiv.remove();
                }
            } finally {
                isLoadingMessages = false;
            }
        }

        // Render messages
        function renderMessages(messages, append = false) {
            const container = document.getElementById('chat-messages-container');
            const messagesHtml = messages.map(message => {
                // Parse markdown for AI messages, escape HTML for user messages
                const messageContent = message.type === 'ai' || message.type === 'bot'
                    ? marked.parse(message.message)
                    : escapeHtml(message.message);

                return `
                    <div class="message ${message.type}">
                        <div class="message-avatar">
                            ${message.type === 'user' ? 'U' : 'AI'}
                        </div>
                        <div class="message-content">
                            <div class="message-text">${messageContent}</div>
                            <div class="message-time">${formatDate(message.timestamp)}</div>
                        </div>
                    </div>
                `;
            }).join('');

            if (append) {
                // Append older messages at the top
                const chatMessages = container.querySelector('.chat-messages');
                if (chatMessages) {
                    chatMessages.insertAdjacentHTML('afterbegin', messagesHtml);
                }
            } else {
                // Initial load - create new chat messages container
                container.innerHTML = `
                    <div class="chat-messages">
                        ${messagesHtml}
                    </div>
                `;

                // Scroll to bottom after initial load - with multiple attempts
                scrollToBottom();

                // Add scroll event listener for loading older messages
                const chatMessages = container.querySelector('.chat-messages');
                if (chatMessages) {
                    chatMessages.addEventListener('scroll', handleScroll);
                }
            }
        }

        // Handle scroll for loading older messages
        function handleScroll(event) {
            const chatMessages = event.target;
            const scrollTop = chatMessages.scrollTop;

            // If scrolled to top and there are more messages, load older messages
            if (scrollTop === 0 && hasMoreMessages && !isLoadingMessages) {
                loadMessages(true);
            }
        }

        // Scroll to bottom function
        function scrollToBottom() {
            // Use requestAnimationFrame to ensure DOM is fully rendered
            requestAnimationFrame(() => {
                const container = document.getElementById('chat-messages-container');
                const chatMessages = container.querySelector('.chat-messages');
                if (chatMessages) {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            });

            // Multiple attempts to ensure scrolling works
            setTimeout(() => {
                const container = document.getElementById('chat-messages-container');
                const chatMessages = container.querySelector('.chat-messages');
                if (chatMessages) {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            }, 100);

            // Second attempt after a longer delay
            setTimeout(() => {
                const container = document.getElementById('chat-messages-container');
                const chatMessages = container.querySelector('.chat-messages');
                if (chatMessages) {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            }, 300);

            // Third attempt to be absolutely sure
            setTimeout(() => {
                const container = document.getElementById('chat-messages-container');
                const chatMessages = container.querySelector('.chat-messages');
                if (chatMessages) {
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                }
            }, 500);
        }

        // Close modal
        function closeModal() {
            document.getElementById('chat-modal').style.display = 'none';
            currentSessionId = null;
            currentMessagesPage = 1;
            hasMoreMessages = true;
            isLoadingMessages = false;
        }

        // Utility functions
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
    </script>
</body>

</html>
