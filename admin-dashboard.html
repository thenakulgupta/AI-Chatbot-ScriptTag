<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .dashboard-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .dashboard-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .dashboard-title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .dashboard-subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .main-content {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .content-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .content-title {
            font-size: 1.8rem;
            font-weight: 600;
            color: #333;
        }

        .filters {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .filter-label {
            font-size: 0.8rem;
            color: #666;
            font-weight: 500;
        }

        select,
        input {
            padding: 10px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 0.9rem;
            transition: border-color 0.3s ease;
            background: white;
        }

        select:focus,
        input:focus {
            outline: none;
            border-color: #667eea;
        }

        .sessions-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .sessions-table th {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            border-radius: 10px 10px 0 0;
        }

        .sessions-table td {
            padding: 15px;
            border-bottom: 1px solid #e1e5e9;
            vertical-align: middle;
        }

        .sessions-table tr:hover {
            background: rgba(102, 126, 234, 0.05);
        }

        .session-id {
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            color: #667eea;
            font-weight: 600;
        }

        .category-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .category-support {
            background: #e3f2fd;
            color: #1976d2;
        }

        .category-sales {
            background: #e8f5e8;
            color: #388e3c;
        }

        .category-general {
            background: #fff3e0;
            color: #f57c00;
        }

        .category-demo {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-active {
            background: #e8f5e8;
            color: #388e3c;
        }

        .status-inactive {
            background: #ffebee;
            color: #d32f2f;
        }

        .action-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 30px;
        }

        .pagination-btn {
            background: white;
            border: 2px solid #e1e5e9;
            color: #667eea;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .pagination-btn:hover:not(:disabled) {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .pagination-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination-info {
            color: #666;
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #e1e5e9;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 2% auto;
            padding: 0;
            border-radius: 20px;
            width: 90%;
            max-width: 1000px;
            max-height: 90vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 5px;
            border-radius: 5px;
            transition: background 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal-body {
            padding: 30px;
            max-height: 60vh;
            overflow-y: auto;
        }

        .chat-messages {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            gap: 15px;
            padding: 15px;
            border-radius: 15px;
            max-width: 80%;
        }

        .message.user {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .message.ai {
            background: #f8f9fa;
            color: #333;
            border: 1px solid #e1e5e9;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: rgba(255, 255, 255, 0.2);
        }

        .message.ai .message-avatar {
            background: #667eea;
            color: white;
        }

        .message-content {
            flex: 1;
        }

        .message-text {
            margin-bottom: 5px;
            line-height: 1.5;
        }

        .message-time {
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .dashboard-container {
                padding: 10px;
            }

            .dashboard-header {
                padding: 20px;
            }

            .dashboard-title {
                font-size: 2rem;
            }

            .content-header {
                flex-direction: column;
                align-items: stretch;
            }

            .filters {
                justify-content: center;
            }

            .sessions-table {
                font-size: 0.9rem;
            }

            .sessions-table th,
            .sessions-table td {
                padding: 10px 8px;
            }

            .modal-content {
                width: 95%;
                margin: 5% auto;
            }

            .modal-body {
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <!-- Dashboard Header -->
        <div class="dashboard-header">
            <h1 class="dashboard-title">AI Chatbot Admin Dashboard</h1>
            <p class="dashboard-subtitle">Monitor and manage all chat sessions</p>

            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="total-sessions">-</div>
                    <div class="stat-label">Total Sessions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="active-sessions">-</div>
                    <div class="stat-label">Active Sessions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="total-messages">-</div>
                    <div class="stat-label">Total Messages</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="categories-count">-</div>
                    <div class="stat-label">Categories</div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="content-header">
                <h2 class="content-title">Chat Sessions</h2>
                <div class="filters">
                    <div class="filter-group">
                        <label class="filter-label">Category</label>
                        <select id="category-filter">
                            <option value="">All Categories</option>
                            <option value="support">Support</option>
                            <option value="sales">Sales</option>
                            <option value="general">General</option>
                            <option value="demo">Demo</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Status</label>
                        <select id="status-filter">
                            <option value="">All Status</option>
                            <option value="active">Active</option>
                            <option value="inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Search</label>
                        <input type="text" id="search-input" placeholder="Search sessions...">
                    </div>
                </div>
            </div>

            <!-- Sessions Table -->
            <div id="sessions-container">
                <div class="loading">Loading sessions...</div>
            </div>

            <!-- Pagination -->
            <div class="pagination" id="pagination" style="display: none;">
                <button class="pagination-btn" id="prev-btn">Previous</button>
                <span class="pagination-info" id="pagination-info"></span>
                <button class="pagination-btn" id="next-btn">Next</button>
            </div>
        </div>
    </div>

    <!-- Chat Messages Modal -->
    <div id="chat-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Chat Messages</h3>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div id="chat-messages-container">
                    <div class="loading">Loading messages...</div>
                </div>
                <div class="pagination" id="messages-pagination" style="display: none;">
                    <button class="pagination-btn" id="messages-prev-btn">Previous</button>
                    <span class="pagination-info" id="messages-pagination-info"></span>
                    <button class="pagination-btn" id="messages-next-btn">Next</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let currentPage = 1;
        let currentMessagesPage = 1;
        let currentSessionId = null;
        const pageSize = 10;
        const messagesPageSize = 20;

        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function () {
            loadStats();
            loadSessions();
            setupEventListeners();
        });

        // Event listeners
        function setupEventListeners() {
            // Filter changes
            document.getElementById('category-filter').addEventListener('change', () => {
                currentPage = 1;
                loadSessions();
            });

            document.getElementById('status-filter').addEventListener('change', () => {
                currentPage = 1;
                loadSessions();
            });

            document.getElementById('search-input').addEventListener('input', debounce(() => {
                currentPage = 1;
                loadSessions();
            }, 500));

            // Pagination
            document.getElementById('prev-btn').addEventListener('click', () => {
                if (currentPage > 1) {
                    currentPage--;
                    loadSessions();
                }
            });

            document.getElementById('next-btn').addEventListener('click', () => {
                currentPage++;
                loadSessions();
            });

            // Messages pagination
            document.getElementById('messages-prev-btn').addEventListener('click', () => {
                if (currentMessagesPage > 1) {
                    currentMessagesPage--;
                    loadMessages();
                }
            });

            document.getElementById('messages-next-btn').addEventListener('click', () => {
                currentMessagesPage++;
                loadMessages();
            });

            // Modal
            document.getElementById('close-modal').addEventListener('click', closeModal);
            document.getElementById('chat-modal').addEventListener('click', (e) => {
                if (e.target.id === 'chat-modal') {
                    closeModal();
                }
            });
        }

        // Load dashboard statistics
        async function loadStats() {
            try {
                const response = await fetch('/api/admin/stats');
                const stats = await response.json();

                document.getElementById('total-sessions').textContent = stats.totalSessions || 0;
                document.getElementById('active-sessions').textContent = stats.activeSessions || 0;
                document.getElementById('total-messages').textContent = stats.totalMessages || 0;
                document.getElementById('categories-count').textContent = stats.categoriesCount || 0;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Load chat sessions
        async function loadSessions() {
            const container = document.getElementById('sessions-container');
            container.innerHTML = '<div class="loading">Loading sessions...</div>';

            try {
                const category = document.getElementById('category-filter').value;
                const status = document.getElementById('status-filter').value;
                const search = document.getElementById('search-input').value;

                const params = new URLSearchParams({
                    page: currentPage,
                    limit: pageSize,
                    ...(category && { category }),
                    ...(status && { status }),
                    ...(search && { search })
                });

                const response = await fetch(`/api/admin/sessions?${params}`);
                const data = await response.json();

                if (data.sessions && data.sessions.length > 0) {
                    renderSessionsTable(data.sessions);
                    updatePagination(data.pagination);
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">💬</div>
                            <h3>No sessions found</h3>
                            <p>No chat sessions match your current filters.</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading sessions:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <h3>Error loading sessions</h3>
                        <p>Please try again later.</p>
                    </div>
                `;
            }
        }

        // Render sessions table
        function renderSessionsTable(sessions) {
            const container = document.getElementById('sessions-container');
            const table = `
                <table class="sessions-table">
                    <thead>
                        <tr>
                            <th>Session ID</th>
                            <th>Category</th>
                            <th>Status</th>
                            <th>Messages</th>
                            <th>Created</th>
                            <th>Last Activity</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${sessions.map(session => `
                            <tr>
                                <td>
                                    <div class="session-id">${session._id}</div>
                                </td>
                                <td>
                                    <span class="category-badge category-${session.category}">
                                        ${session.category}
                                    </span>
                                </td>
                                <td>
                                    <span class="status-badge status-${session.isActive ? 'active' : 'inactive'}">
                                        ${session.isActive ? 'Active' : 'Inactive'}
                                    </span>
                                </td>
                                <td>${session.messageCount || 0}</td>
                                <td>${formatDate(session.createdAt)}</td>
                                <td>${formatDate(session.lastActivity)}</td>
                                <td>
                                    <button class="action-btn" onclick="viewMessages('${session._id}')">
                                        View Messages
                                    </button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            container.innerHTML = table;
        }

        // Update pagination
        function updatePagination(pagination) {
            const paginationDiv = document.getElementById('pagination');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const info = document.getElementById('pagination-info');

            if (pagination.totalPages > 1) {
                paginationDiv.style.display = 'flex';
                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = currentPage === pagination.totalPages;
                info.textContent = `Page ${currentPage} of ${pagination.totalPages} (${pagination.total} total)`;
            } else {
                paginationDiv.style.display = 'none';
            }
        }

        // View messages for a session
        function viewMessages(sessionId) {
            currentSessionId = sessionId;
            currentMessagesPage = 1;
            document.getElementById('modal-title').textContent = `Chat Messages - ${sessionId}`;
            document.getElementById('chat-modal').style.display = 'block';
            loadMessages();
        }

        // Load messages for a session
        async function loadMessages() {
            const container = document.getElementById('chat-messages-container');
            container.innerHTML = '<div class="loading">Loading messages...</div>';

            try {
                const params = new URLSearchParams({
                    page: currentMessagesPage,
                    limit: messagesPageSize
                });

                const response = await fetch(`/api/admin/sessions/${currentSessionId}/messages?${params}`);
                const data = await response.json();

                if (data.messages && data.messages.length > 0) {
                    renderMessages(data.messages);
                    updateMessagesPagination(data.pagination);
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">💬</div>
                            <h3>No messages found</h3>
                            <p>This session has no messages yet.</p>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading messages:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <h3>Error loading messages</h3>
                        <p>Please try again later.</p>
                    </div>
                `;
            }
        }

        // Render messages
        function renderMessages(messages) {
            const container = document.getElementById('chat-messages-container');
            const messagesHtml = `
                <div class="chat-messages">
                    ${messages.map(message => `
                        <div class="message ${message.type}">
                            <div class="message-avatar">
                                ${message.type === 'user' ? 'U' : 'AI'}
                            </div>
                            <div class="message-content">
                                <div class="message-text">${escapeHtml(message.message)}</div>
                                <div class="message-time">${formatDate(message.timestamp)}</div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            container.innerHTML = messagesHtml;
        }

        // Update messages pagination
        function updateMessagesPagination(pagination) {
            const paginationDiv = document.getElementById('messages-pagination');
            const prevBtn = document.getElementById('messages-prev-btn');
            const nextBtn = document.getElementById('messages-next-btn');
            const info = document.getElementById('messages-pagination-info');

            if (pagination.totalPages > 1) {
                paginationDiv.style.display = 'flex';
                prevBtn.disabled = currentMessagesPage === 1;
                nextBtn.disabled = currentMessagesPage === pagination.totalPages;
                info.textContent = `Page ${currentMessagesPage} of ${pagination.totalPages} (${pagination.total} total)`;
            } else {
                paginationDiv.style.display = 'none';
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('chat-modal').style.display = 'none';
            currentSessionId = null;
        }

        // Utility functions
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
    </script>
</body>

</html>
