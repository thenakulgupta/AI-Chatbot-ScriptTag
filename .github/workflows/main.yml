name: Deploy (Main)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        required: true
        default: production

env:
  AWS_EC2_USER: ubuntu
  AWS_EC2_HOST: 13.204.41.230
  PORT: 3001
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  GROQ_MODEL: openai/gpt-oss-120b
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  MONGODB_DATABASE: chatbot-script

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Convert secret to JSON matrix safely
        id: set-matrix
        run: |
          IPS="${{ vars.ELASTIC_IPS }}"

          # Convert comma-separated string into JSON array manually
          JSON="["
          FIRST=true
          IFS=',' read -ra ADDR <<< "$IPS"
          for ip in "${ADDR[@]}"; do
            if [ "$FIRST" = true ]; then
              FIRST=false
            else
              JSON+=","
            fi
            JSON+="\"$ip\""
          done
          JSON+="]"

          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
  deploy:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        host: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set current host
        run: echo "AWS_EC2_HOST=${{ matrix.host }}" >> $GITHUB_ENV

      - name: Create SSH key file from GitHub secret
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_KEY_EC2 }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          if [ -z "$(cat ~/.ssh/key.pem)" ]; then
            echo "ERROR: SSH Key secret is empty"
            exit 1
          fi

      - name: make .env
        run: |
          echo "PORT=${{ env.PORT}}" >> .env
          echo "GROQ_API_KEY=${{ env.GROQ_API_KEY}}" >> .env
          echo "GROQ_MODEL=${{ env.GROQ_MODEL}}" >> .env
          echo "MONGODB_URI=${{ env.MONGODB_URI}}" >> .env
          echo "MONGODB_DATABASE=${{ env.MONGODB_DATABASE}}" >> .env

      - name: Add EC2 host to known_hosts
        run: |
          ssh-keyscan -H ${{ env.AWS_EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Make build and zip the entire backend directory
        run: |
          npm i
          npm run build
          rm -rf ai-chatbot-full.js
          zip -r ai-chatbot-scriptag.zip ./*

      - name: Delete existing build directory on EC2
        run: |
          ssh -i ~/.ssh/key.pem -o "StrictHostKeyChecking=no" ${{ env.AWS_EC2_USER }}@${{ env.AWS_EC2_HOST }} << 'ENDSSH'
          sudo rm -rf ~/ai-chatbot-scriptag
          mkdir -p ~/ai-chatbot-scriptag
          ENDSSH

      - name: Copy project zip to EC2 instance
        run: |
          scp -i ~/.ssh/key.pem -o "StrictHostKeyChecking=no" -v .env ai-chatbot-scriptag.zip ${{ env.AWS_EC2_USER }}@${{ env.AWS_EC2_HOST }}:~/ai-chatbot-scriptag/

      - name: Setup EC2 instance (packages + PM2 + Python)
        run: |
          ssh -i ~/.ssh/key.pem -o "StrictHostKeyChecking=no" ${{ env.AWS_EC2_USER }}@${{ env.AWS_EC2_HOST }} << 'ENDSSH'
          sudo apt-get update
          sudo apt-get install -y unzip rsync
          command -v nvm || curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
          export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"; [ -s "$NVM_DIR/bash_completion" ] && . "$NVM_DIR/bash_completion"
          nvm install stable
          nvm use stable
          npm install -g pm2
          export PATH="$PATH:$HOME/.npm-global/bin"
          ENDSSH

      - name: SSH into EC2 and deploy app
        run: |
          ssh -i ~/.ssh/key.pem -o "StrictHostKeyChecking=no" ${{ env.AWS_EC2_USER }}@${{ env.AWS_EC2_HOST }} << 'ENDSSH'
          # Load nvm environment
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          [ -s "$NVM_DIR/bash_completion" ] && . "$NVM_DIR/bash_completion"
          nvm use stable

          cd ~/ai-chatbot-scriptag
          unzip ai-chatbot-scriptag.zip

          # Stop existing process
          pm2 delete ai-chatbot-scriptag || true

          # Copy everything to /var/www, including .env
          sudo mkdir -p /var/www/ai-chatbot-scriptag
          sudo rsync -a . /var/www/ai-chatbot-scriptag/

          # Start via PM2
          cd /var/www/ai-chatbot-scriptag
          pm2 start server.js --name ai-chatbot-scriptag
          pm2 save

          # Clean up temp files
          sudo rm -rf ~/ai-chatbot-scriptag
          ENDSSH
