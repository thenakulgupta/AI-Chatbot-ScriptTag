<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="chatbot.css">
</head>

<body>
    <!-- Chatbot CTA Button (Bottom Right) -->
    <div id="chatbot-cta" class="chatbot-cta">
        <div class="cta-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M20 2H4C2.9 2 2 2.9 2 4V22L6 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2 20 2ZM20 16H5.17L4 17.17V4H20V16Z"
                    fill="currentColor" />
                <path d="M7 9H17V11H7V9ZM7 12H15V14H7V12Z" fill="currentColor" />
            </svg>
        </div>
        <div class="cta-pulse"></div>
    </div>

    <!-- Chatbot Popup (Bottom Right) -->
    <div id="chatbot-popup" class="chatbot-popup">
        <div class="chatbot-header">
            <div class="chatbot-title">
                <div class="chatbot-avatar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 2C13.1 2 14 2.9 14 4C14 5.1 13.1 6 12 6C10.9 6 10 5.1 10 4C10 2.9 10.9 2 12 2ZM21 9V7L15 1H5C3.89 1 3 1.89 3 3V21C3 22.11 3.89 23 5 23H19C20.11 23 21 22.11 21 21V9M19 9H14V4H5V21H19V9Z"
                            fill="currentColor" />
                    </svg>
                </div>
                <div class="chatbot-info">
                    <h3>AI Assistant</h3>
                    <span class="status">Online</span>
                </div>
            </div>
            <button id="chatbot-close" class="chatbot-close">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12L19 6.41Z"
                        fill="currentColor" />
                </svg>
            </button>
        </div>

        <div class="chatbot-content">
            <!-- Welcome Message -->
            <div id="welcome-section" class="welcome-section">
                <div class="welcome-message">
                    <h4>Welcome! 👋</h4>
                    <p>I'm here to help you with any questions you might have. How can I assist you today?</p>
                </div>
                <button id="start-chat-btn" class="start-chat-btn">
                    Start a Chat
                </button>
            </div>

            <!-- Chat Interface -->
            <div id="chat-interface" class="chat-interface" style="display: none;">
                <div id="chat-messages" class="chat-messages">
                    <!-- Messages will be dynamically added here -->
                </div>

                <div class="typing-indicator" id="typing-indicator" style="display: none;">
                    <div class="typing-dots">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <span id="typing-text">AI is typing...</span>
                </div>
                <div class="chat-input-container">
                    <div class="chat-input-wrapper">
                        <input type="text" id="chat-input" placeholder="Type your message..." maxlength="500">
                        <button id="send-btn" class="send-btn" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z" fill="currentColor" />
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="chatbot-loading" class="chatbot-loading" style="display: none;">
        <div class="loading-spinner"></div>
        <p>Loading chatbot...</p>
    </div>
</body>

</html>
